<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 40 40" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Subtle chess pattern background">
  <defs>
    <pattern id="chessTile" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="transparent" />
      <!-- subtle navy squares -->
      <rect x="0" y="0" width="20" height="20" fill="#0B1F4D" fill-opacity="0.06" />
      <rect x="20" y="20" width="20" height="20" fill="#0B1F4D" fill-opacity="0.06" />
      <!-- tiny gold accents -->
      <g fill="#D4AF37" opacity="0.04">
        <circle cx="10" cy="10" r="2" />
        <circle cx="30" cy="30" r="2" />
      </g>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#chessTile)" />
</svg>
