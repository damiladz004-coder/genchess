<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">Chess classroom hero placeholder</title>
  <desc id="desc">Placeholder for a real photo of a chess instructor teaching students with a demonstration board.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="800" fill="url(#bg)"/>
  <rect x="120" y="120" width="1360" height="560" rx="20" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.5"/>
  <text x="800" y="340" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="54" font-weight="700">
    Replace With Real Classroom Hero Photo
  </text>
  <text x="800" y="405" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="34">
    Instructor Teaching with Demonstration Chessboard
  </text>
</svg>

